name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick libmagickwand-dev pngquant

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Lint
        run: bundle exec rubocop

      - name: Test
        run: bundle exec rspec

      - name: Generate icons
        run: bundle exec ruby main.rb

      - name: Upload iconset
        uses: actions/upload-artifact@v4
        with:
          name: iconset
          path: output/
