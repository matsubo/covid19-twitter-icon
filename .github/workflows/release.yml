name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  iconset:
    name: Build & publish iconset
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ImageMagick + pngquant
        run: sudo apt-get update && sudo apt-get install -y imagemagick libmagickwand-dev pngquant zip

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Generate iconset
        run: bundle exec ruby main.rb

      - name: Compress PNGs
        run: pngquant --force --ext .png output/*.png

      - name: Bundle iconset
        run: |
          version="${{ steps.meta.outputs.version }}"
          cd output && zip -r "../covid19-twitter-icon-${version}.zip" . -x "*.DS_Store"

      - name: Upload iconset artifact
        uses: actions/upload-artifact@v4
        with:
          name: iconset-${{ steps.meta.outputs.version }}
          path: covid19-twitter-icon-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: covid19-twitter-icon-*.zip

  docker:
    name: Build & publish Docker image to GHCR
    runs-on: ubuntu-latest
    needs: iconset
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
